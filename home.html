<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- Font awesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <style>
        *{
              font-family: "Geist", sans-serif;
        }
     </style>
</head>
<body>

    <nav class="w-full border  border-b border-gray-300 py-3 ">
       <div class=" w-11/12 mx-auto flex flex-col md:flex-row justify-between mt-3 ">
         <div class="sm:mx-auto sm:mb-2 flex gap-2 items-center ">
        <img class="w-10" src="./assets/github-logo.png" alt="">
        <h2 class="text-[#1F2937] font-bold text-xl">GitHub Issues Tracker</h2>
       </div>

       <div class="flex gap-2">

       <div class="relative w-80 sm:mx-5">
         <input id="searchInput" 
         class="w-full border border-gray-300 rounded-md py-2 pl-10 pr-3 outline-none" 
         type="search" placeholder="Search issues..."> <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
       </div>
         <button class="bg-[#4A00FF] rounded-sm py-2 px-4 text-white font-semibold"><i class="fa-solid fa-plus "></i>New Issue</button>
       </div>
       </div>
    
    </nav>

    <section class="sm:mx-10 mt-10 md:mx-40 bg-white shadow-sm rounded-sm p-5">
        <div class="flex flex-col md:flex-row justify-between">
            <div class="">
                <div class="flex gap-2" >
            <img src="./assets/Aperture.png" alt="">
            <h2 class="text-[#1F2937] text-[20px] font-semibold"><span id="totalIssues">0</span> Issues</h2>
        </div>
        <p class="text-[#64748B] ml-10">Track and manage your project issues</p>
            </div>

        <div class="flex gap-5 text-sm sm:mx-10 sm:mt-2 ">
            <span class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                Open
            </span>
            <span class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                Closed
            </span>

        </div>
        </div>

    </section>

    <section class="mt-10 mx-10 md:mx-40 bg-white shadow-sm rounded-sm p-5">
        <button onclick="filterIssues('all', this)" class="tab-btn border border-gray-300 rounded-sm py-1 px-5 font-semibold">All</button>
        <button onclick="filterIssues('open', this)"  class="tab-btn border border-gray-300 rounded-sm py-1 px-5 font-semibold">Open</button>
        <button onclick="filterIssues('closed', this)"  class="tab-btn border border-gray-300 rounded-sm py-1 px-5 font-semibold">Closed</button>
    </section>

    <!-- Issue card -->
    <div id="issuesContainer" class=" mx-10 md:mx-40 grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 shadow-lg hover:shadow-2xl transition" >

    </div>


    <!-- Modal  -->

<div id="issueModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
        
        <h2 id="modalTitle" class="text-[#1F2937] font-bold text-2xl mb-4"></h2>

        <div class="flex flex-wrap items-center gap-3 mb-6">
            <span class="bg-[#00A96E] text-white px-4 py-1 rounded-full text-sm font-semibold flex items-center gap-1">
                <i class="fa-solid fa-circle-check"></i> Opened
            </span>
            <span class="text-[#64748B] text-sm flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
                Opened by <span id="modalAssigneeName" class="font-medium text-gray-700"></span>
            </span>
            <span >
                <span class="w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
                <span id="modalCreatedAt"></span>
            </span>
        </div>

        <div class="flex gap-2 mb-6">
            <span class=" bg-red-100 text-red-600 text-[11px] px-3 py-1 rounded-full border border-red-100 uppercase tracking-wider">
                bug
            </span>
            <span class="bg-orange-50 text-orange-600 text-[11px] px-3 py-1 rounded-full border border-orange-100 uppercase tracking-wider">
                help wanted
            </span>
        </div>

        <p id="modalDescription" class="text-[#64748B] text-base mb-8"></p>

        <div class="bg-[#F8FAFC] rounded-xl p-6 flex justify-between items-center border border-gray-100 mb-6">
            <div>
                <p class=" text-[#64748B] tracking-widest text-[15px] mb-1">Assignee:</p>
                <p id="modalAssignee" class="mt-2 text-[13px] font-bold text-[#1F2937] "></p>
            </div>
            <div class="text-right">
                <p class="text-[#64748B] text-[18px] font-medium mb-1">Priority:</p>
                <span id="modalPriority" class="bg-[#FF4D4D] text-white px-5 py-1 rounded-full text-sm font-bold uppercase"></span>
            </div>
        </div>

       <div class="flex justify-end">
    <button onclick="closeModal()" class="bg-[#4A00FF] hover:bg-[#3D00D1] text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-all">
        Close
    </button>
</div>
    </div>
</div>


    <script src="./js/script.js"></script>
</body>
</html>
