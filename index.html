<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


     <style>
        *{
              font-family: "Geist", sans-serif;
        }
     </style>
</head>
<body class="min-h-screen max-w-md bg-white mx-auto shadow-2xl rounded-lg">
    <div class=" text-center ">
        <img class="w-[100px] mx-auto pt-10" src="./assets/github-logo.png" alt="">
        <h2 class="text-[#1F2937] font-bold text-xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B] text-[13px]">Sign in to manage your issues</p>
    </div>

    <div class="form pt-10">
         <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto ">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold text-[#1F2937]">Username</label>
          <input id="login-username" type="email" maxlength="5" minlength="11" class="input bg-base-200" placeholder="Enter Username" />

          <br>

          <label class="label text-[#1F2937] text-neutral font-bold">Password</label>
          <input id="input-pin" type="password" maxlength="8" minlength="4" class="input bg-base-200" placeholder="Enter Password" />
          <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        
        <div class="relative flex items-center justify-center">
            <div class="flex-grow border-t border-gray-200"></div> <span class="flex-shrink mx-4 text-gray-400 text-sm font-medium">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>  </div>

            <div class="text-center">
                <p class="text-[#64748B] text-sm mb-3">Demo Credentials:</p>

                <div class="">
                    <p class="text-[#1F2937]">
                        <span class="font-bold">Username:</span> admin
                    </p>
                    <p class="text-[#1F2937]">
                        <span class="font-bold">Password:</span> admin123
                    </p>
                </div>
           


        </div>
      </div>
    </div>
    </div>


   
    <script src="./js/login.js"></script>
</body>
</html>
